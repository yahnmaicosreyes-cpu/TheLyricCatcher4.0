<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Lyric Catcher</title>
  <!--
    Content Security Policy
    ───────────────────────
    default-src  'none'  — block everything not explicitly listed
    script-src   'self'  — only load JS from this origin (data.js, app.js)
    style-src    'self'  — only load CSS from this origin (style.css)
    connect-src  'self'  — allow fetch() to the same-origin API
    base-uri     'self'  — prevent <base> tag hijacking
    form-action  'none'  — no form submissions
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'none';">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">
  <div id="logo">
    <span class="logo-the">The</span>
    <span class="logo-main">Lyric Catcher</span>
  </div>

  <input type="text" id="search-input" placeholder="Type what you hear..." autocomplete="off" />
  <div id="status">Type a lyric snippet — verse or chorus — to find the song.</div>
  <div id="no-results">No match found. Try a different phrase.</div>
  <div id="results"></div>

  <div id="drop-zone">
    <div>Drag and drop a .txt song file here</div>
    <button id="choose-btn">Choose File</button>
    <input type="file" id="file-input" accept=".txt" multiple />
  </div>
  <div id="toast"></div>
  <button id="library-btn">View Library</button>
  <div id="song-count"></div>
</div>

<!-- Song Detail Modal -->
<div id="song-modal">
  <div id="song-overlay"></div>
  <div id="song-box">
    <div id="song-modal-header">
      <div id="song-modal-title"></div>
      <div id="song-modal-meta"></div>
      <button id="song-modal-close">&#x2715;</button>
    </div>
    <div id="song-modal-lyrics"></div>
  </div>
</div>

<!-- Library Modal -->
<div id="library-modal">
  <div id="library-overlay"></div>
  <div id="library-box">
    <div id="library-header">
      <span>Library</span>
      <button id="library-close">&#x2715;</button>
    </div>
    <div id="library-body"></div>
    <div id="library-add">
      <button id="library-add-toggle">+ Add Song Manually</button>
      <div id="add-song-form">
        <input id="add-title" placeholder="Title *" />
        <input id="add-artist" placeholder="Artist *" />
        <input id="add-album" placeholder="Album (optional)" />
        <textarea id="add-lyrics" placeholder="Lyrics * — use [Verse], [Chorus] markers if needed"></textarea>
        <div id="add-song-actions">
          <button class="lib-btn-save" id="add-song-submit">Add</button>
          <button class="lib-btn-cancel" id="add-song-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Song View Page -->
<div id="song-view-page">
  <div id="song-view-inner">
    <div id="song-view-nav">
      <button id="song-view-back">&#8592; Back</button>
      <button id="song-view-project">&#9654; Project</button>
    </div>
    <div id="song-view-title"></div>
    <div id="song-view-meta"></div>
    <div id="song-view-lyrics"></div>
  </div>
</div>

<!-- Projection Mode -->
<div id="projection-mode">
  <div id="projection-title"></div>
  <button id="projection-exit">Exit</button>
  <button id="projection-prev">&#10094;</button>
  <div id="projection-slide">
    <div id="projection-section-label"></div>
    <div id="projection-text"></div>
  </div>
  <button id="projection-next">&#10095;</button>
  <div id="projection-controls">
    <button class="proj-ctrl-btn" id="projection-font-dec">A−</button>
    <button class="proj-ctrl-btn" id="projection-font-inc">A+</button>
    <button class="proj-ctrl-btn" id="projection-blank">Blank</button>
  </div>
  <div id="projection-counter"></div>
</div>

<!-- data.js must load before app.js (defines API client functions) -->
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
